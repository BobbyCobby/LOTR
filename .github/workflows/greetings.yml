name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Thank you for opening an issue! If I'm slow to respond, ping me with @BobbyCobby."
        pr-message: "Thank you for opening a PR! If I'm slow to respond, ping me with @BobbyCobby."
